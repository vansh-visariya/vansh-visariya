<svg fill="none" viewBox="0 0 800 420" width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
        @keyframes typing1 { from { width: 0; } to { width: 12ch; } }
        @keyframes typing2 { from { width: 0; } to { width: 24ch; } }
        @keyframes typing3 { from { width: 0; } to { width: 16ch; } }
        @keyframes typing4 { from { width: 0; } to { width: 28ch; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .terminal {
          background: #0d1117;
          border-radius: 10px;
          font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
          font-size: 14px;
          padding: 0;
          overflow: hidden;
          box-shadow: 0 4px 30px rgba(0, 255, 0, 0.1);
        }
        .header {
          background: #161b22;
          padding: 10px 15px;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .btn { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .title { color: #8b949e; font-size: 12px; margin-left: 10px; }
        .body { padding: 20px; color: #c9d1d9; line-height: 1.8; }
        .prompt { color: #7ee787; }
        .path { color: #79c0ff; }
        .cmd { color: #f0f6fc; }
        .comment { color: #8b949e; }
        .highlight { color: #ff7b72; }
        .info { color: #58a6ff; }
        .success { color: #7ee787; }
        .cursor {
          display: inline-block;
          width: 10px;
          height: 18px;
          background: #7ee787;
          animation: blink 1s step-end infinite;
          vertical-align: middle;
          margin-left: 2px;
        }
        .line { margin: 4px 0; white-space: nowrap; }
        .typing1 {
          overflow: hidden;
          white-space: nowrap;
          animation: typing1 1s steps(12) 0.5s forwards;
          width: 0;
          display: inline-block;
        }
        .output1 {
          opacity: 0;
          animation: fadeIn 0.3s ease 1.8s forwards;
        }
        .typing2 {
          overflow: hidden;
          white-space: nowrap;
          animation: typing2 1.5s steps(24) 2.5s forwards;
          width: 0;
          display: inline-block;
          opacity: 0;
          animation: fadeIn 0s ease 2.5s forwards, typing2 1.5s steps(24) 2.5s forwards;
        }
        .output2 {
          opacity: 0;
          animation: fadeIn 0.3s ease 4.5s forwards;
        }
        .typing3 {
          overflow: hidden;
          white-space: nowrap;
          width: 0;
          display: inline-block;
          opacity: 0;
          animation: fadeIn 0s ease 5.5s forwards, typing3 1s steps(16) 5.5s forwards;
        }
        .output3 {
          opacity: 0;
          animation: fadeIn 0.3s ease 7s forwards;
        }
        .final-cursor {
          opacity: 0;
          animation: fadeIn 0s ease 7.5s forwards, blink 1s step-end 7.5s infinite;
        }
      </style>
      
      <div class="terminal">
        <div class="header">
          <div class="btn red"></div>
          <div class="btn yellow"></div>
          <div class="btn green"></div>
          <span class="title">vansh@github: ~/profile</span>
        </div>
        <div class="body">
          <div class="line">
            <span class="prompt">vansh@github</span>:<span class="path">~</span>$ <span class="typing1 cmd">cat about.txt</span>
          </div>
          <div class="output1">
            <div class="line"><span class="success">Name:</span> Vansh Visariya</div>
            <div class="line"><span class="success">Role:</span> AI/ML Developer</div>
            <div class="line"><span class="success">Current:</span> Building MindMesh 🧠</div>
            <div class="line"><span class="success">Learning:</span> LLMs &amp; AI Evolution</div>
          </div>
          <div class="line output2" style="margin-top: 12px;">
            <span class="prompt">vansh@github</span>:<span class="path">~</span>$ <span class="typing2 cmd">echo $TECH_STACK | head -5</span>
          </div>
          <div class="output2">
            <div class="line"><span class="info">Python</span> | <span class="info">C++</span> | <span class="info">PyTorch</span> | <span class="info">TensorFlow</span></div>
            <div class="line"><span class="info">FastAPI</span> | <span class="info">OpenCV</span> | <span class="info">CUDA</span> | <span class="info">scikit-learn</span></div>
          </div>
          <div class="line output3" style="margin-top: 12px;">
            <span class="prompt">vansh@github</span>:<span class="path">~</span>$ <span class="typing3 cmd">echo "Let's build something awesome!" </span>
          </div>
          <div class="output3">
            <div class="line" style="color: #7ee787;">Let's build something awesome! 🚀</div>
          </div>
          <div class="line output3" style="margin-top: 8px;">
            <span class="prompt">vansh@github</span>:<span class="path">~</span>$ <span class="cursor final-cursor"></span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
