<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vansh@terminal ~ $</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
            padding: 20px;
        }

        .terminal {
            background: #161b22;
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            min-height: 500px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.1);
            overflow: hidden;
        }

        .terminal-header {
            background: #21262d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .btn-red { background: #ff5f56; }
        .btn-yellow { background: #ffbd2e; }
        .btn-green { background: #27c93f; }

        .terminal-title {
            color: #8b949e;
            font-size: 13px;
            margin-left: 10px;
        }

        .terminal-body {
            padding: 20px;
            height: 450px;
            overflow-y: auto;
            color: #c9d1d9;
            font-size: 14px;
            line-height: 1.6;
        }

        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-body::-webkit-scrollbar-track {
            background: #21262d;
        }

        .terminal-body::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        .output-line {
            margin-bottom: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt {
            color: #58a6ff;
        }

        .prompt-user {
            color: #7ee787;
        }

        .prompt-at {
            color: #8b949e;
        }

        .prompt-host {
            color: #ff7b72;
        }

        .prompt-path {
            color: #a5d6ff;
        }

        .command {
            color: #f0f6fc;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        #command-input {
            background: transparent;
            border: none;
            color: #f0f6fc;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
            caret-color: #7ee787;
        }

        .success { color: #7ee787; }
        .error { color: #ff7b72; }
        .info { color: #58a6ff; }
        .warning { color: #d29922; }
        .highlight { color: #a371f7; }
        .cyan { color: #79c0ff; }
        .dim { color: #8b949e; }

        .ascii-art {
            color: #7ee787;
            font-size: 11px;
            line-height: 1.2;
        }

        a {
            color: #58a6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .skill-bar {
            display: inline-block;
            background: #21262d;
            border-radius: 3px;
            overflow: hidden;
            width: 100px;
            height: 10px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, #7ee787, #58a6ff);
        }

        @media (max-width: 600px) {
            .terminal-body {
                font-size: 12px;
                padding: 15px;
            }
            .ascii-art {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="terminal">

            <div class="terminal-btn btn-red"></div>
            <div class="terminal-btn btn-yellow"></div>
            <div class="terminal-btn btn-green"></div>
            <span class="terminal-title">vansh@github: ~/profile</span>
        </div>
        <div class="terminal-body" id="terminal-body">

            <div class="input-line">
                <span class="prompt">
                    <span class="prompt-user">vansh</span><span class="prompt-at">@</span><span class="prompt-host">github</span>:<span class="prompt-path">~</span>$ 
                </span>
                <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">

`,
            contact: () => `

  project discussions, or just to say hi!</span>

            github: () => {
                window.open('https://github.com/vansh-visariya', '_blank');
                return '<span class="success">Opening GitHub profile...</span>';
            },
            clear: () => {
                output.innerHTML = '';
                return null;
            },
            neofetch: () => `
<span class="ascii-art">       _,met\$\$\$\$\$gg.          </span><span class="success">vansh</span>@<span class="success">github</span>
<span class="ascii-art">    ,g\$\$\$\$\$\$\$\$\$\$\$\$\$\$\$P.       </span>──────────────
<span class="ascii-art">  ,g\$\$P"     """Y\$\$."._       </span><span class="info">OS:</span> Developer Edition

<span class="ascii-art"> \$\$;      Y\$b._   _,d\$P'     </span><span class="info">Languages:</span> Python, C++
<span class="ascii-art"> Y\$\$.    \`.\`"Y\$\$\$\$P"'        </span><span class="info">Focus:</span> AI/ML
<span class="ascii-art"> \`\$\$b      "-.__              </span><span class="info">Status:</span> <span class="success">Building cool stuff</span>
<span class="ascii-art">  \`Y\$\$                        </span>
<span class="ascii-art">   \`Y\$\$.                      </span><span class="dim">🎮 Gaming Mode: ON</span>
<span class="ascii-art">     \`\$\$b.                    </span>
<span class="ascii-art">       \`Y\$\$b.                 </span>
<span class="ascii-art">          \`"Y\$b._             </span>
<span class="ascii-art">              \`"""            </span>
`,
            'sudo rm -rf': () => `<span class="error">Nice try! 😏 But this terminal is protected.</span>`,
            'sudo': () => `<span class="error">Permission denied. You're not root here!</span>`,
            'ls': () => `<span class="cyan">about.txt</span>  <span class="cyan">skills/</span>  <span class="cyan">projects/</span>  <span class="cyan">contact.txt</span>  <span class="success">README.md</span>`,
            'pwd': () => `/home/vansh/profile`,
            'date': () => new Date().toString(),
            'echo': (args) => args.join(' ') || '',
            'cat': () => `<span class="dim">Try 'whoami', 'skills', or 'projects' instead!</span>`,
            'cd': () => `<span class="dim">You're already where you need to be! 🏠</span>`,
            'exit': () => `<span class="warning">You can't escape this easily! Try 'social' to find me elsewhere.</span>`,
            'hello': () => `<span class="success">Hey there! 👋 Nice to meet you!</span>`,
            'hi': () => `<span class="success">Hello! Welcome to my terminal! Type 'help' to explore.</span>`,
        };

        // Command aliases
        commands.about = commands.whoami;
        commands.info = commands.whoami;
        commands.tech = commands.skills;
        commands.stack = commands.skills;
        commands.work = commands.projects;
        commands.links = commands.social;
        commands.email = commands.contact;
        commands.mail = commands.contact;
        commands.cls = commands.clear;
        commands.man = commands.help;
        commands['--help'] = commands.help;
        commands['-h'] = commands.help;
        commands['?'] = commands.help;

        function printOutput(html) {
            if (html === null) return;
            const div = document.createElement('div');
            div.className = 'output-line';
            div.innerHTML = html;
            output.appendChild(div);
        }

        function printCommand(cmd) {
            const div = document.createElement('div');
            div.className = 'output-line';
            div.innerHTML = `<span class="prompt"><span class="prompt-user">vansh</span><span class="prompt-at">@</span><span class="prompt-host">github</span>:<span class="prompt-path">~</span>$ </span><span class="command">${cmd}</span>`;
            output.appendChild(div);
        }

        function executeCommand(cmdLine) {
            const parts = cmdLine.trim().split(' ');
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);

            printCommand(cmdLine);

            if (cmd === '') {
                // Empty command, just show new prompt
            } else if (commands[cmd]) {
                const result = typeof commands[cmd] === 'function' 
                    ? commands[cmd](args) 
                    : commands[cmd];
                printOutput(result);
            } else {
                printOutput(`<span class="error">Command not found: ${cmd}</span>\n<span class="dim">Type 'help' for available commands.</span>`);
            }

            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        // Initialize with welcome message
        printOutput(WELCOME_MSG);

        // Handle input
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value;
                input.value = '';
                executeCommand(cmd);
            }
        });

        // Keep focus on input
        document.addEventListener('click', () => input.focus());
        terminalBody.addEventListener('click', () => input.focus());

        // Command history
        let history = [];
        let historyIndex = -1;

        input.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    input.value = history[history.length - 1 - historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = history[history.length - 1 - historyIndex];
                } else {
                    historyIndex = -1;
                    input.value = '';
                }
            } else if (e.key === 'Enter' && input.value.trim()) {
                history.push(input.value.trim());
                historyIndex = -1;
            }
        });

        // Tab completion
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const partial = input.value.toLowerCase();
                const matches = Object.keys(commands).filter(cmd => cmd.startsWith(partial));
                if (matches.length === 1) {
                    input.value = matches[0];
                } else if (matches.length > 1) {
                    printCommand(input.value);
                    printOutput(`<span class="dim">${matches.join('  ')}</span>`);
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                }
            }
        });
    </script>
</body>
</html>
